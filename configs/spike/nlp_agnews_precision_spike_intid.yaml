run:
  output_root: artifacts/spike/nlp_precision
  gpu_name: RTX4060_Laptop
  device: cuda:0
  batch_size: 1
  seed: 20260317
workload:
  id: bert_base_agnews
  e0_alias: nlp
  type: text_classification
  model_name: textattack/bert-base-uncased-ag-news
  checkpoint: null
  num_labels: 4
measurement:
  warmup_requests: 100
  measure_requests: 500
  repeat_per_request: 100
  energy_backend: nvml_total_energy
  nvml_gpu_index: 0
  power_integration_enabled: true
  power_sample_interval_ms: 10
  power_min_samples: 20
data:
  calibration_csv: E:/a-carbon/data/splits/agnews_calibration_2000_intid.csv
  profile_csv: E:/a-carbon/data/splits/agnews_profile_5000_intid.csv
  sample_id_col: sample_id_int
  label_col: label
  group_id_col: group_id
  text_col: text
admission:
  static_hq_mode_id: fp32_k4
  max_accuracy_drop_pp: 1.0
  max_latency_multiplier_vs_hq_p95: 1.5
  max_modes: 4
  collapse_equivalent_modes: true
  equiv_accuracy_pp: 0.1
  equiv_p95_rel: 0.02
  equiv_energy_rel: 0.02
status:
  paper_use: false
  purpose: nlp_precision_backend_spike
modes:
- mode_id: fp32_k4
  precision: fp32
  capacity_k: 4
  backend: pytorch
- mode_id: fp16_k4
  precision: fp16
  capacity_k: 4
  backend: pytorch
